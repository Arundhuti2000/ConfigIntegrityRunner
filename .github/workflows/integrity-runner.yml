      #   env:
      #     SNOW_INSTANCE: ${{ secrets.SERVICENOW_INSTANCE }}
      #     SNOW_USER:     ${{ secrets.SERVICENOW_USER }}
      #     SNOW_PASS:     ${{ secrets.SERVICENOW_PASSWORD }}
      #   run: ./scripts/Push-ToServiceNow.ps1 -PayloadPath ./integrity-output/servicenow-payload.json
      # ──────────────────────────────────────────────────────────────────
